name: Build Android Release

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare release signing
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${RELEASE_KEYSTORE:?Missing RELEASE_KEYSTORE secret}"
          : "${RELEASE_STORE_PASSWORD:?Missing RELEASE_STORE_PASSWORD secret}"
          : "${RELEASE_KEY_ALIAS:?Missing RELEASE_KEY_ALIAS secret}"
          : "${RELEASE_KEY_PASSWORD:?Missing RELEASE_KEY_PASSWORD secret}"

          mkdir -p "$HOME/.gradle" "$HOME/keystore"
          {
            printf 'RELEASE_STORE_FILE=%s\n' "$HOME/keystore/upload-key.jks"
            printf 'RELEASE_STORE_PASSWORD=%s\n' "$RELEASE_STORE_PASSWORD"
            printf 'RELEASE_KEY_ALIAS=%s\n' "$RELEASE_KEY_ALIAS"
            printf 'RELEASE_KEY_PASSWORD=%s\n' "$RELEASE_KEY_PASSWORD"
          } > "$HOME/.gradle/gradle.properties"

          printf '%s' "$RELEASE_KEYSTORE" | base64 --decode > "$HOME/keystore/upload-key.jks"
          chmod 600 "$HOME/.gradle/gradle.properties" "$HOME/keystore/upload-key.jks"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Point ANDROID_HOME at SDK root
        run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Install Android SDK platform + build-tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "build-tools;35.0.0" \
            "platforms;android-36"

      - name: Clean any leftover wrapper jar
        run: rm -f gradle/wrapper/gradle-wrapper.jar

      - name: Download Gradle 8.11.1
        run: |
          set -euo pipefail
          curl --fail --location --show-error --silent \
            https://services.gradle.org/distributions/gradle-8.11.1-bin.zip \
            -o gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.11.1/bin" >> "$GITHUB_PATH"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.11.1

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build signed release bundle
        run: ./gradlew --no-daemon --stacktrace --info clean bundleRelease

      - name: Name release bundle
        run: |
          set -euo pipefail
          VERSION_NAME=$(grep -m1 'versionName' app/build.gradle | sed -E 's/.*"([^"]+)".*/\1/')
          AAB_BASENAME="bluetooth-device-finder-${VERSION_NAME}-release"
          AAB_FILE="${AAB_BASENAME}.aab"
          cp app/build/outputs/bundle/release/app-release.aab "$AAB_FILE"
          echo "AAB_BASENAME=$AAB_BASENAME" >> "$GITHUB_ENV"
          echo "AAB_FILE=$AAB_FILE" >> "$GITHUB_ENV"

      - name: Verify AAB signature
        run: |
          set -euo pipefail
          jarsigner -verify "$AAB_FILE" 2>&1 | tee jarsigner-output.txt
          grep -Fq "jar verified." jarsigner-output.txt

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-and-kotlin-logs
          path: |
            **/build/reports/**
            **/build/tmp/kotlin-compile*/**
            ~/.gradle/daemon/*/daemon-*.out.log
            ~/.gradle/caches/**/kotlin/**
            ./**/build/outputs/logs/**
            ./**/build/*/reports/**
            jarsigner-output.txt

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.AAB_BASENAME }}
          path: ${{ env.AAB_FILE }}
